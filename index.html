<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">

    <title>BMSA</title>

    <meta name="title" content="BMSA">
    <meta name="description" content="BMSA: a browser-based viewer for multiple sequence alignments (MSAs).">
    <meta name="keywords" content="MSA, multiple sequence alignment, bioinformatics, FASTA, alignment viewer">
    <meta name="viewport" content="width=device-width">

    <!-- Open Graph metatags for sharing -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="BMSA">
    <meta property="og:site_name" content="BMSA">
    <meta property="og:description" content="A browser-based viewer for multiple sequence alignments.">

    <!-- Favicon: an inline SVG, so there is no external request and no extra file to ship. -->
    <link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2032%2032'%3E%3Crect%20width='32'%20height='32'%20rx='6'%20fill='%231d6fb8'/%3E%3Ctext%20x='16'%20y='23'%20font-family='Helvetica,Arial,sans-serif'%20font-size='19'%20font-weight='bold'%20text-anchor='middle'%20fill='white'%3EB%3C/text%3E%3C/svg%3E">

    <style>
        body { margin: 0px; overflow: hidden; background-color: black; }
        canvas.emscripten { border: 0px none; background-color: black; }
    </style>
    <script type='text/javascript' src="https://cdn.jsdelivr.net/gh/eligrey/FileSaver.js/dist/FileSaver.min.js"> </script>
    <script type='text/javascript'>
        function saveFileFromMEMFSToDisk(memoryFSname, localFSname)     // This can be called by C/C++ code
        {
            var isSafari = false; // Not supported, navigator.userAgent access is being restricted
            //var isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
            var data = FS.readFile(memoryFSname);
            var blob;

            if (isSafari) blob = new Blob([data.buffer], { type: "application/octet-stream" });
            else blob = new Blob([data.buffer], { type: "application/octet-binary" });

            // NOTE: SaveAsDialog is a browser setting. For example, in Google Chrome,
            // in Settings/Advanced/Downloads section you have a setting:
            // 'Ask where to save each file before downloading' - which you can set true/false.
            // If you enable this setting it would always ask you and bring the SaveAsDialog
            saveAs(blob, localFSname);
        }
    </script>
    </head>
    <body>
        <canvas class=emscripten id=canvas oncontextmenu=event.preventDefault() tabindex=-1></canvas>

        <!-- Hidden file input for File > Open. The C side calls bmsaOpenFile()
             (via emscripten_run_script), which clicks this input; once a file is
             chosen we write its bytes into the Emscripten filesystem and hand the
             path back to C through bmsa_web_load_file. -->
        <input type="file" id="bmsaFileInput"
               accept=".fa,.fasta,.fna,.afa,.aln,.txt,.gz" style="display:none" />
        <!-- Hidden file input for File > Load metadata, the same hand-off as Open but routed to
             bmsa_web_load_metadata. -->
        <input type="file" id="bmsaMetaInput"
               accept=".csv,.tsv,.txt" style="display:none" />
        <script type='text/javascript'>
            // Click a hidden file input, write the chosen file into the Emscripten filesystem, and
            // hand its path to a C callback. Shared by the alignment and metadata inputs.
            function bmsaWireInput(inputId, callback) {
                document.getElementById(inputId).addEventListener('change', function(e) {
                    var file = e.target.files[0];
                    if (!file) return;
                    var reader = new FileReader();
                    reader.onload = function() {
                        var data = new Uint8Array(reader.result);
                        var path = '/' + file.name;
                        try {
                            FS.writeFile(path, data);
                        } catch (err) {
                            console.error('Could not write file into the filesystem', err);
                            return;
                        }
                        Module.ccall(callback, null, ['string'], [path]);
                    };
                    reader.readAsArrayBuffer(file);
                    e.target.value = '';  // let the same file be picked again
                });
            }
            function bmsaOpenFile() {
                document.getElementById('bmsaFileInput').click();
            }
            function bmsaOpenMetadata() {
                document.getElementById('bmsaMetaInput').click();
            }
            bmsaWireInput('bmsaFileInput', 'bmsa_web_load_file');
            bmsaWireInput('bmsaMetaInput', 'bmsa_web_load_metadata');
        </script>
        <script>
            var Module = {
                print: function(text) {
                    if (arguments.length > 1) text = Array.prototype.slice.call(arguments).join(' ');
                    console.log(text);
                },
                canvas: document.getElementById('canvas')
            };
        </script>
        <script async type="text/javascript" src="bmsa.js"></script>
    </body>
</html>
